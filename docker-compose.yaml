version: '3.8'

services:
  waha:
    image: devlikeapro/waha
    container_name: waha
    ports:
      - "3000:3000"
    volumes:
      - ./sessions:/app/.sessions
      - ./env/.env:/app/.env:ro
    env_file:
      - ./env/.env
    restart: unless-stopped
    environment:
      - TZ=America/Lima
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
